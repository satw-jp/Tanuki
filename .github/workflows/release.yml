name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Build
        run: dotnet build --configuration Release

      - name: Package
        run: |
          mkdir dist
          cp bin/Release/net7.0/Tanuki.rhp  dist/Tanuki_net7.rhp
          cp bin/Release/net48/Tanuki.rhp   dist/Tanuki_net48.rhp

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Tanuki_net7.rhp
            dist/Tanuki_net48.rhp
          body: |
            ## インストール方法
            - **Windows**: `Tanuki_net48.rhp` をダウンロードして Rhino 8 のビューポートにドラッグ&ドロップ
            - **Mac**: `Tanuki_net7.rhp` をダウンロードして Rhino 8 のビューポートにドラッグ&ドロップ
            - Rhino を再起動

            ## コマンド一覧
            - `TanukiSetupGrid` — 通り芯の設定
            - `TanukiSetupLevel` — レベルの設定
            - `TanukiFloorPlan` — 平面図生成
            - `TanukiRCP` — 天井伏図生成
            - `TanukiSection` — 断面図生成（任意角度）
            - `TanukiElevation` — 立面図生成（任意角度）
            - `TanukiUpdateAll` — 全図面を再生成
